{{ $file := site.Params.logo.header }}
{{ $fileDimensions := partial "commons/image/helpers/GetDimensions" (dict "context" . "file" $file "static" true) }}
<a class="logo" href="{{ site.BaseURL }}">
  <img src="{{ $file }}" alt="{{ site.Title }}" height="{{ index $fileDimensions 1 }}" width="{{ index $fileDimensions 0 }}">
  <span>{{ site.Params.logo.line }}</span>
</a>
